name: Supply chain

on:
  pull_request:
  push:
    branches: [master]
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  source-sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify deterministic CycloneDX source SBOM
        run: python tools/generate_sbom.py --check

  cargo-deny:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Install pinned cargo-deny
        run: cargo install --locked cargo-deny --version 0.19.9
      - name: Enforce licenses, bans, advisories, and sources
        run: cargo deny --locked check

  cargo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Install pinned cargo-audit
        run: cargo install --locked cargo-audit --version 0.22.2
      - name: Fail on vulnerabilities, unmaintained crates, and yanked crates
        run: cargo audit --deny warnings
