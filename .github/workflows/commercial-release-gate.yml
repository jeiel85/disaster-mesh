name: Commercial release gate

on:
  workflow_dispatch:
  push:
    tags: ["android-v1.*"]

permissions:
  contents: read

jobs:
  require-approved-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pinned validation dependency
        run: python -m pip install -r tools/requirements-validation.txt
      - name: Refuse incomplete commercial evidence
        run: python tools/check_release_readiness.py --require-ready
      - name: Refuse unresolved disclosure placeholders
        run: python tools/check_policy_consistency.py --require-publishable
      - name: Validate signed release evidence inputs
        shell: bash
        run: |
          args=(
            release/evidence/release-manifest.json
            --signature release/evidence/release-manifest.json.sig
            --verification release/evidence/release-manifest.signature-verification.txt
            --expected-commit "$GITHUB_SHA"
          )
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            args+=(--expected-tag "$GITHUB_REF_NAME")
          fi
          python tools/validate_release_manifest.py "${args[@]}"
