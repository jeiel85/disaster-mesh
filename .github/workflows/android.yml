name: Android

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install pinned Android SDK packages
        run: >-
          sdkmanager
          "platforms;android-37.0"
          "platforms;android-36"
          "build-tools;36.0.0"
          "ndk;28.2.13676358"
          "platform-tools"
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk --version 4.1.2
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true
      - name: Verify module architecture
        run: python tools/verify_android_architecture.py
      - name: Build, lint, and unit test all bootstrap variants
        working-directory: apps/android
        run: >-
          ./gradlew --no-daemon
          :app:lintOfflineRelease
          :app:testOfflineReleaseUnitTest
          :app:assembleOfflineRelease
          :app:assembleFieldTestRelease
          :app:assembleDevDebug
          :app:assembleDevDebugAndroidTest
      - name: Verify merged offline manifest policy
        run: python tools/verify_android_manifest.py
      - name: Verify Rust libraries are packaged for the supported ABIs
        run: |
          apk=apps/android/app/build/outputs/apk/offline/release/app-offline-release-unsigned.apk
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            unzip -Z1 "$apk" | grep -qx "lib/$abi/libmesh_ffi.so"
          done
          if unzip -Z1 "$apk" | grep -Eq '^lib/(armeabi|mips|mips64)/'; then
            echo "Unsupported legacy ABI found in offlineRelease" >&2
            exit 1
          fi

  instrumentation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install pinned Android SDK and NDK
        run: >-
          sdkmanager
          "platforms;android-37.0"
          "build-tools;36.0.0"
          "ndk;28.2.13676358"
          "platform-tools"
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-ndk
        run: cargo install --locked cargo-ndk --version 4.1.2
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true
      - name: Run Rust facade instrumentation test
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 36
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: apps/android/gradlew --project-dir apps/android --no-daemon :app:connectedDevDebugAndroidTest
