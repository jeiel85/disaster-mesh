name: Rust

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install contract validators
        run: |
          python -m pip install --requirement tools/requirements-validation.txt
          cargo install --locked cddl --version 0.10.5
      - name: Verify generated contract constants
        run: python tools/generate_contracts.py --check
      - name: Validate normative design contracts
        run: python tools/validate_design_bundle.py
      - name: Test commercial release tooling
        run: python -m unittest discover -s tools/tests -v
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - name: Tests
        run: cargo test --locked --workspace
      - name: Verify cross-process cryptographic vectors
        run: cargo run --locked -p mesh-engine --bin vector-tool -- verify
      - name: Verify test-only code is absent from the FFI dependency graph
        run: |
          cargo tree --locked -p mesh-ffi > "$RUNNER_TEMP/mesh-ffi-tree.txt"
          if grep -Eq 'mesh-sim|proptest' "$RUNNER_TEMP/mesh-ffi-tree.txt"; then
            echo "test or simulator dependency leaked into mesh-ffi" >&2
            exit 1
          fi
      - name: Deterministic 100-node simulator acceptance
        run: cargo test --locked -p mesh-sim sim_003_one_hundred_nodes_is_seeded_and_deterministic
      - name: Validate source distribution
        run: |
          mkdir "$RUNNER_TEMP/disaster-mesh-distribution"
          git archive HEAD | tar -x -C "$RUNNER_TEMP/disaster-mesh-distribution"
          cd "$RUNNER_TEMP/disaster-mesh-distribution"
          python tools/validate_design_bundle.py --distribution
      - name: Verify generated UniFFI bindings
        run: |
          ./tools/generate_uniffi_bindings.sh
          git diff --exit-code -- apps/android/core-bridge/src/main/kotlin

  fuzz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install pinned cargo-fuzz
        run: cargo install --locked cargo-fuzz --version 0.13.2
      - name: Run every parser and reassembly target
        run: |
          for target in cbor bundle ble_frames ble_reassembly control crypto_envelopes; do
            cargo fuzz run "$target" -- -max_total_time=10 -timeout=2
          done
