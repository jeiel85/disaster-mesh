name: Unsigned release evidence

on:
  workflow_dispatch:
  push:
    tags: ["android-v0.*"]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: android-actions/setup-android@v3
      - name: Install pinned Android toolchain
        run: >-
          sdkmanager "platforms;android-37.0" "platforms;android-36"
          "build-tools;36.0.0" "ndk;28.2.13676358" "platform-tools"
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - name: Install pinned build tools
        run: cargo install --locked cargo-ndk --version 4.1.2
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true
      - name: Build unsigned offline artifact and native symbols
        working-directory: apps/android
        run: ./gradlew --no-daemon :app:assembleOfflineRelease :app:extractOfflineReleaseNativeSymbolTables
      - name: Generate release evidence inventory
        run: |
          mkdir -p release/evidence/run
          python tools/generate_sbom.py --output release/evidence/run/sbom.cdx.json
          cp apps/android/app/build/outputs/apk/offline/release/app-offline-release-unsigned.apk release/evidence/run/
          cp -R test-vectors release/evidence/run/test-vectors
          if [ -d apps/android/app/build/intermediates/native_symbol_tables ]; then
            cp -R apps/android/app/build/intermediates/native_symbol_tables release/evidence/run/native-symbols
          fi
          (cd release/evidence/run && find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS)
      - uses: actions/upload-artifact@v4
        with:
          name: unsigned-release-evidence-${{ github.sha }}
          path: release/evidence/run
          if-no-files-found: error
          retention-days: 90
      - name: Attest APK provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release/evidence/run/app-offline-release-unsigned.apk
      - name: Attest SBOM provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release/evidence/run/sbom.cdx.json
