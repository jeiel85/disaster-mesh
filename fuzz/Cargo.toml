[package]
name = "disaster-mesh-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "=0.4.13"
mesh-bundle = { path = "../core/mesh-bundle" }
mesh-codec = { path = "../core/mesh-codec" }
mesh-crypto = { path = "../core/mesh-crypto" }

[[bin]]
name = "cbor"
path = "fuzz_targets/cbor.rs"
