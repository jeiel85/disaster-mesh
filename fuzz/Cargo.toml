path = "fuzz_targets/bundle.rs"
test = false
doc = false
bench = false

[[bin]]
name = "ble_frames"
path = "fuzz_targets/ble_frames.rs"
test = false
doc = false
bench = false

[[bin]]
name = "ble_reassembly"
path = "fuzz_targets/ble_reassembly.rs"
test = false
doc = false
bench = false

[[bin]]
name = "control"
path = "fuzz_targets/control.rs"
test = false
doc = false
bench = false

[[bin]]
name = "crypto_envelopes"
path = "fuzz_targets/crypto_envelopes.rs"
test = false
